<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Flayost 🧀</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧀</text></svg>">
<style>
  :root{
    --page-a:#f7e8c9; --page-b:#e6d5ef;           /* provence: solmoden fløte -> lavendel */
    --card:#fffdf7; --ink:#3f2d1e; --muted:#8a7a66;
    --ochre:#d97706; --ochre-soft:#fdeed3; --lav:#7c6bb8; --olive:#5f7a3d;
    --green:#16a34a; --red:#dc2626;
    --soft:#f6efe2; --line:#e8ddc8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;
    background:linear-gradient(135deg,var(--page-a),var(--page-b)); color:var(--ink);
    display:flex; align-items:flex-start; justify-content:center;
    padding:16px; padding-bottom:110px; min-height:100%;
  }
  .app{width:100%; max-width:1080px;}
  .card{background:var(--card); border-radius:22px; padding:22px; box-shadow:0 14px 40px rgba(80,50,10,.16); margin-bottom:16px;}
  h1{margin:0 0 2px; font-size:34px; text-align:center; letter-spacing:.5px;}
  h2{margin:0 0 14px; font-size:21px;}
  .sub{color:var(--muted); text-align:center; margin:0 0 18px; font-size:14px;}
  button{font-family:inherit; cursor:pointer; border:none; border-radius:14px; font-size:16px; padding:12px; transition:transform .05s, background .15s; color:var(--ink);}
  button:active{transform:scale(.95);}
  .primary{background:var(--ochre); color:#fff; font-size:20px; font-weight:800; padding:16px; width:100%; margin-top:16px;}
  .primary:disabled{opacity:.45; cursor:default;}
  .ghost{background:var(--soft); font-weight:600;}
  .ghost.small{padding:8px 12px; font-size:14px;}
  .danger{background:#fee2e2; color:var(--red); font-weight:700;}
  input[type=text],input[type=tel],textarea{font-family:inherit; font-size:17px; padding:12px 13px; border:2px solid var(--line); border-radius:12px; width:100%; background:#fff; color:var(--ink);}
  textarea{resize:none;}
  label.blk{display:block; font-weight:700; margin:14px 0 8px;}
  .row{display:flex; gap:8px; flex-wrap:wrap;}
  .flex{display:flex; gap:8px; align-items:center;}
  .grow{flex:1;}
  .hidden{display:none !important;}
  .mini{font-size:13px; color:var(--muted);}
  .center{text-align:center;}

  /* ---------- login ---------- */
  #screen-login{max-width:560px; margin:0 auto;}
  .logo{font-size:64px; text-align:center; line-height:1; margin:6px 0 4px;}
  .members{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin:6px 0 2px;}
  .member-btn{background:var(--soft); border:2px solid var(--line); border-radius:18px; padding:14px 8px; text-align:center; font-weight:800; font-size:17px;}
  .member-btn .ava{display:block; font-size:40px; margin-bottom:6px;}
  .newbtn{background:var(--ochre-soft); border:2px dashed var(--ochre); color:var(--ochre);}

  .ava-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:8px; max-height:216px; overflow-y:auto; padding:6px; background:#fff; border-radius:12px; border:2px solid var(--line);}
  .ava-grid button{font-size:26px; padding:9px 0; background:#fff; border:2px solid transparent; border-radius:10px;}
  .ava-grid button.on{border-color:var(--ochre); background:var(--ochre-soft);}
  .chip{background:var(--soft); border:2px solid var(--line); font-weight:700; padding:11px 16px; border-radius:999px;}
  .chip.on{background:var(--lav); color:#fff; border-color:var(--lav);}

  .pinwrap{max-width:320px; margin:0 auto;}
  .pindots{display:flex; justify-content:center; gap:14px; margin:14px 0 18px; font-size:30px; letter-spacing:2px; min-height:40px;}
  .pindots span{width:22px; height:22px; border-radius:50%; border:3px solid var(--line); display:inline-block;}
  .pindots span.on{background:var(--ochre); border-color:var(--ochre);}
  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .keypad button{font-size:26px; font-weight:800; padding:16px; background:var(--soft);}
  .keypad .del{background:#fde8c8;}
  .pin-err{color:var(--red); font-weight:800; text-align:center; min-height:24px; margin-top:10px;}
  .shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

  /* ---------- wall ---------- */
  .topbar{display:flex; align-items:center; gap:12px; margin:2px 2px 14px;}
  .topbar .brand{font-size:26px; font-weight:900; letter-spacing:.5px;}
  .topbar .brand small{font-weight:600; color:var(--muted); font-size:13px; display:block; letter-spacing:0;}
  .me{margin-left:auto; display:flex; align-items:center; gap:8px; background:var(--card); border-radius:999px; padding:6px 14px 6px 8px; box-shadow:0 4px 14px rgba(80,50,10,.12); font-weight:800;}
  .me .ava{font-size:26px;}
  .tabs{display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;}
  .tab{border-radius:999px; padding:11px 20px; font-weight:800; background:rgba(255,253,247,.7); border:2px solid transparent;}
  .tab.on{background:var(--ink); color:#fff;}
  .wall{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px;}
  .cheese{background:var(--card); border-radius:20px; overflow:hidden; box-shadow:0 8px 24px rgba(80,50,10,.13); display:flex; flex-direction:column;}
  .cheese .photo{height:150px; background:var(--ochre-soft); display:flex; align-items:center; justify-content:center; font-size:64px; cursor:pointer; background-size:cover; background-position:center;}
  .cheese .body{padding:12px 14px 14px;}
  .cheese .name-row{display:flex; align-items:baseline; gap:8px; cursor:pointer;}
  .cheese .name{font-size:19px; font-weight:900; flex:1;}
  .cheese .avg{font-size:17px; font-weight:900; white-space:nowrap;}
  .cheese .avg small{color:var(--muted); font-weight:600;}
  .cheese .meta{display:flex; gap:6px; align-items:center; margin:4px 0 10px; flex-wrap:wrap;}
  .typechip{background:var(--soft); border-radius:999px; padding:3px 10px; font-size:12.5px; font-weight:700; color:var(--muted);}
  .badge-new{background:var(--lav); color:#fff; border-radius:999px; padding:3px 10px; font-size:12.5px; font-weight:800;}
  .emorow{display:flex; gap:6px;}
  .emorow button{flex:1; font-size:28px; padding:9px 0 7px; background:var(--soft); border-radius:14px; line-height:1;}
  .emorow button.on{background:var(--ochre-soft); box-shadow:inset 0 0 0 3px var(--ochre); transform:scale(1.06);}
  .emorow.big button{font-size:40px; padding:13px 0 10px;}
  .empty{background:rgba(255,253,247,.75); border-radius:20px; padding:40px 20px; text-align:center; font-size:19px; font-weight:700; color:var(--muted);}
  .fab{position:fixed; right:22px; bottom:22px; background:var(--ochre); color:#fff; font-size:19px; font-weight:900; border-radius:999px; padding:17px 26px; box-shadow:0 12px 30px rgba(120,70,0,.35); z-index:40;}

  /* ---------- overlays ---------- */
  .overlay{position:fixed; inset:0; background:rgba(63,45,30,.45); display:flex; align-items:flex-start; justify-content:center; padding:18px; z-index:50; overflow-y:auto;}
  .sheet{background:var(--card); border-radius:24px; width:100%; max-width:560px; padding:22px; margin:auto 0; box-shadow:0 24px 70px rgba(0,0,0,.35);}
  .sheet-top{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  .sheet-top h2{margin:0; flex:1;}
  .closex{background:var(--soft); border-radius:50%; width:42px; height:42px; font-size:19px; font-weight:900; padding:0;}
  .dphoto{border-radius:16px; width:100%; max-height:290px; object-fit:cover; margin:8px 0; display:block;}
  .dphoto-emoji{background:var(--ochre-soft); border-radius:16px; text-align:center; font-size:84px; padding:26px 0; margin:8px 0;}
  .rlist{margin-top:14px;}
  .rline{display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:12px; background:var(--soft); margin-bottom:7px;}
  .rline .ava{font-size:26px;}
  .rline .who{font-weight:800;}
  .rline .note{color:var(--muted); font-size:14px; flex:1; font-style:italic;}
  .rline .sc{font-size:26px; margin-left:auto;}
  .photobtn{display:flex; align-items:center; justify-content:center; gap:10px; background:var(--soft); border:2px dashed var(--line); border-radius:16px; padding:14px; font-weight:700; width:100%; font-size:16px;}

  /* ---------- osteforslag (oppslag mens du skriver) ---------- */
  .sugwrap{position:relative;}
  .suglist{position:absolute; left:0; right:0; top:calc(100% + 6px); background:var(--card); border:2px solid var(--line); border-radius:16px; box-shadow:0 16px 38px rgba(80,50,10,.25); z-index:20; overflow:hidden; overflow-y:auto; max-height:272px;}
  .sugitem{display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:none; border-radius:0; padding:13px 14px; font-size:16px; border-bottom:1px solid var(--line); min-height:52px;}
  .sugitem:last-child{border-bottom:none;}
  .sugitem:active{background:var(--ochre-soft);}
  .sugitem .smilk{font-size:22px;}
  .sugitem .sname{font-weight:800; flex:1;}
  .sugitem .sorig{color:var(--muted); font-size:13px; font-weight:600; text-align:right;}
  .originline{display:flex; align-items:center; gap:8px; margin-top:8px; background:var(--ochre-soft); border:2px solid var(--line); border-radius:12px; padding:7px 8px 7px 12px; font-weight:700; font-size:14.5px;}
  .originline .otxt{flex:1;}
  .originline button{background:none; padding:4px 10px; font-size:16px; font-weight:900; color:var(--muted);}
  #addPreview{width:100%; border-radius:16px; max-height:240px; object-fit:cover; margin-top:8px;}
  .scorehint{text-align:center; font-weight:800; min-height:26px; margin-top:8px; color:var(--olive); font-size:17px;}

  /* toast + confetti */
  #toast{position:fixed; left:50%; transform:translateX(-50%); bottom:96px; background:var(--ink); color:#fff; padding:12px 20px; border-radius:999px; font-weight:700; font-size:15px; z-index:99; opacity:0; transition:opacity .25s; pointer-events:none; max-width:88vw; text-align:center;}
  #toast.show{opacity:1;}
  .confetto{position:fixed; z-index:98; font-size:26px; pointer-events:none; animation:fall 1s ease-in forwards;}
  @keyframes fall{
    0%{transform:translate(0,0) scale(1) rotate(0deg); opacity:1;}
    100%{transform:translate(var(--dx),var(--dy)) scale(1.4) rotate(var(--rot)); opacity:0;}
  }
  @media (max-width:520px){
    .wall{grid-template-columns:1fr;}
    .topbar .brand{font-size:22px;}
  }
</style>
</head>
<body>
<div class="app">

  <!-- ================= LOGIN ================= -->
  <div id="screen-login">
    <div class="card">
      <div class="logo">🧀</div>
      <h1>Flayost</h1>
      <p class="sub">Familiens ostesmaking i Flayosc — hvilken fransk ost er best?</p>

      <!-- steg 1: hvem er du -->
      <div id="login-who">
        <div class="members" id="memberButtons"></div>
        <button class="member-btn newbtn" style="width:100%; margin-top:10px;" onclick="showNewMember()">
          <span class="ava">➕</span>Ny smaker
        </button>
      </div>

      <!-- steg 2a: ny smaker -->
      <div id="login-new" class="hidden">
        <h2>Ny smaker 🎉</h2>
        <label class="blk">Hva heter du?</label>
        <input type="text" id="newName" maxlength="20" placeholder="Navnet ditt" autocomplete="off">
        <label class="blk">Velg figuren din</label>
        <div class="ava-grid" id="avaGrid"></div>
        <label class="blk">Er du barn eller voksen?</label>
        <div class="row">
          <button class="chip on" id="chipKid" onclick="setKid(true)">🧒 Barn</button>
          <button class="chip" id="chipAdult" onclick="setKid(false)">🧑 Voksen</button>
        </div>
        <p class="mini" style="margin-top:14px;">Velg en hemmelig 4-sifret kode. Den bruker du for å logge inn på alle iPad-ene.</p>
        <button class="primary" onclick="startPin('create')">Velg kode →</button>
        <button class="ghost small" style="width:100%; margin-top:10px;" onclick="showWho()">← Tilbake</button>
      </div>

      <!-- steg 2b: pin -->
      <div id="login-pin" class="hidden">
        <div class="pinwrap">
          <h2 class="center" id="pinTitle">Skriv koden din</h2>
          <div class="pindots" id="pinDots"><span></span><span></span><span></span><span></span></div>
          <div class="keypad">
            <button onclick="pinKey(1)">1</button><button onclick="pinKey(2)">2</button><button onclick="pinKey(3)">3</button>
            <button onclick="pinKey(4)">4</button><button onclick="pinKey(5)">5</button><button onclick="pinKey(6)">6</button>
            <button onclick="pinKey(7)">7</button><button onclick="pinKey(8)">8</button><button onclick="pinKey(9)">9</button>
            <button class="del" onclick="pinDel()">⌫</button><button onclick="pinKey(0)">0</button><button class="del" onclick="showWho()">✕</button>
          </div>
          <div class="pin-err" id="pinErr"></div>
        </div>
      </div>
    </div>
    <p class="mini center">Flayosc + ost = Flayost 🇫🇷 · Én ting, gjort skikkelig godt.</p>
  </div>

  <!-- ================= OSTEVEGGEN ================= -->
  <div id="screen-wall" class="hidden">
    <div class="topbar">
      <div class="brand">🧀 Flayost<small>Familiens ostesmaking i Flayosc</small></div>
      <button class="me" onclick="logout()" title="Bytt smaker">
        <span class="ava" id="meAva">🧀</span><span id="meName"></span>
        <span class="mini">bytt</span>
      </button>
    </div>
    <div class="tabs">
      <button class="tab on" id="tab-beste" onclick="setTab('beste')">🏆 Beste</button>
      <button class="tab" id="tab-nyeste" onclick="setTab('nyeste')">🆕 Nyeste</button>
      <button class="tab" id="tab-usmakt" onclick="setTab('usmakt')">👅 Ikke smakt</button>
    </div>
    <div class="wall" id="wall"></div>
    <button class="fab" onclick="openAdd()">➕ Ny ost</button>
  </div>
</div>

<!-- ================= OST-DETALJER ================= -->
<div class="overlay hidden" id="overlay-detail" onclick="if(event.target===this)closeDetail()">
  <div class="sheet">
    <div class="sheet-top">
      <h2 id="dName"></h2>
      <button class="closex" onclick="closeDetail()">✕</button>
    </div>
    <div class="mini" id="dMeta"></div>
    <div id="dPhotoWrap"></div>
    <div class="center" style="font-size:22px; font-weight:900; margin:6px 0;" id="dAvg"></div>
    <label class="blk">Din dom:</label>
    <div class="emorow big" id="dEmoRow"></div>
    <div class="scorehint" id="dHint"></div>
    <label class="blk">Smaksnotat <span class="mini">(valgfritt)</span></label>
    <div class="flex">
      <input type="text" id="dNote" maxlength="120" placeholder="F.eks. «smaker som sokker, men på en god måte»">
      <button class="ghost" onclick="saveNote()">Lagre</button>
    </div>
    <div class="rlist" id="dRatings"></div>
    <button class="danger hidden" id="dDelete" style="width:100%; margin-top:14px;" onclick="deleteCheese()">🗑 Slett osten (kun voksne)</button>
  </div>
</div>

<!-- ================= NY OST ================= -->
<div class="overlay hidden" id="overlay-add" onclick="if(event.target===this)closeAdd()">
  <div class="sheet">
    <div class="sheet-top">
      <h2>Ny ost 🧀</h2>
      <button class="closex" onclick="closeAdd()">✕</button>
    </div>
    <label class="blk">Hva heter osten?</label>
    <div class="sugwrap">
      <input type="text" id="addName" maxlength="60" placeholder="F.eks. Banon, Comté, Brie de Meaux…" autocomplete="off"
             oninput="onAddNameInput()" onfocus="renderSuggestions()" onblur="setTimeout(hideSuggestions,200)">
      <div class="suglist hidden" id="sugList"></div>
    </div>
    <div class="originline hidden" id="originLine"></div>
    <div id="originManual">
      <label class="blk">Hvor er den fra? <span class="mini">(valgfritt)</span></label>
      <input type="text" id="addOrigin" maxlength="60" placeholder="F.eks. Provence, Normandie…" autocomplete="off">
    </div>
    <label class="blk">Melk fra…</label>
    <div class="row" id="milkRow"></div>
    <label class="blk">Type <span class="mini">(valgfritt)</span></label>
    <div class="row" id="texRow"></div>
    <label class="blk">Bilde <span class="mini">(valgfritt)</span></label>
    <button class="photobtn" onclick="document.getElementById('addFile').click()">📷 Ta bilde av osten</button>
    <input type="file" id="addFile" accept="image/*" capture="environment" class="hidden" onchange="onPhotoPicked(this)">
    <img id="addPreview" class="hidden" alt="">
    <button class="primary" id="addSave" onclick="saveCheese()">Legg til osten</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

/* ---------- hjelpere ---------- */
function saveLocal(){
  localStorage.setItem(LS_BOARD, JSON.stringify(BOARD));
  if(SESS) localStorage.setItem(LS_SESS, JSON.stringify(SESS));
}
async function rpc(fn, args){
  if(!supa) throw new Error('offline');
  const {data, error} = await supa.rpc(fn, args);
  if(error) throw error;
  return data;
}
let toastTimer = null;
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function confetti(x, y, emoji){
  for(let i=0;i<10;i++){
    const c = document.createElement('div');
    c.className = 'confetto';
    c.textContent = Math.random()<.5 ? emoji : '🧀';
    c.style.left = (x-13)+'px'; c.style.top = (y-13)+'px';
    c.style.setProperty('--dx', (Math.random()*220-110)+'px');
    c.style.setProperty('--dy', (Math.random()*-160-40)+'px');
    c.style.setProperty('--rot', (Math.random()*540-270)+'deg');
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 1100);
  }
}
function memberOf(name){ return BOARD.members.find(m=>m.name===name); }
function ratingsFor(id){ return BOARD.ratings.filter(r=>r.cheese_id===id); }
function myRating(id){ return SESS ? BOARD.ratings.find(r=>r.cheese_id===id && r.member===SESS.name) : null; }
function avgOf(id){
  const rs = ratingsFor(id);
  if(!rs.length) return null;
  return rs.reduce((s,r)=>s+r.score,0)/rs.length;
}

/* ---------- kø for dommer som ikke kom fram (dårlig ferie-wifi) ---------- */
let PENDING = [];   // [{cheese_id, score, note}] — siste dom per ost vinner
try{ PENDING = JSON.parse(localStorage.getItem(LS_PENDING)) || []; }catch(e){}
function queuePending(cheese_id, score, note){
  PENDING = PENDING.filter(p=>p.cheese_id!==cheese_id);
  PENDING.push({cheese_id, score, note});
  localStorage.setItem(LS_PENDING, JSON.stringify(PENDING));
}
async function flushPending(){
  if(!SESS || !PENDING.length) return;
  const still = [];
  for(const p of PENDING){
    try{
      const res = await rpc('flayost_rate', {p_name:SESS.name, p_pin:SESS.pin, p_cheese_id:p.cheese_id, p_score:p.score, p_note:p.note});
      if(!res || !res.ok) continue;      // avvist (f.eks. slettet ost) — dropp den
    }catch(e){ still.push(p); }          // fortsatt offline — behold i køen
  }
  PENDING = still;
  localStorage.setItem(LS_PENDING, JSON.stringify(PENDING));
}

/* ---------- synk av tavla ---------- */
let refreshing = false;
async function refreshBoard(){
  if(!SESS || refreshing) return;
  refreshing = true;
  await flushPending();
  try{
    const res = await rpc('flayost_get_board', {p_name:SESS.name, p_pin:SESS.pin});
    if(res && res.ok){
      BOARD = {members:res.members, cheeses:res.cheeses, ratings:res.ratings};
      // dommer som fortsatt ligger i kø skal ikke forsvinne fra skjermen
      PENDING.forEach(p=>{
        const r = BOARD.ratings.find(x=>x.cheese_id===p.cheese_id && x.member===SESS.name);
        if(r){ r.score=p.score; r.note=p.note; }
        else if(BOARD.cheeses.some(c=>c.id===p.cheese_id))
          BOARD.ratings.push({cheese_id:p.cheese_id, member:SESS.name, score:p.score, note:p.note, updated_at:new Date().toISOString()});
      });
      saveLocal();
      renderAll();
    }else if(res && res.error==='wrong_pin'){
      toast('Koden stemmer ikke lenger – logg inn på nytt');
      logout();
    }
  }catch(e){ /* offline: cachen lever videre, prøver igjen senere */ }
  refreshing = false;
}
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) refreshBoard(); });
setInterval(refreshBoard, 90000);

function pinKey(n){
  if(pinBuf.length>=4) return;
  pinBuf += String(n);

  if(pinBuf.length===4) submitPin();
}
function pinDel(){ pinBuf = pinBuf.slice(0,-1); renderPinDots(); $('pinErr').textContent=''; }
async function submitPin(){
  const create = pinMode==='create';
  try{
    const res = await rpc('flayost_login', {
      p_name: pinTarget.name, p_pin: pinBuf,
      p_avatar: create ? pinTarget.avatar : null,
      p_is_kid: create ? pinTarget.is_kid : null,
      p_create: create
    });
    if(res && res.ok){
      SESS = {name:res.member.name, pin:pinBuf, avatar:res.member.avatar, is_kid:res.member.is_kid};
      saveLocal();
      if(res.created) toast(`Velkommen, ${SESS.name}! 🎉`);
      enterWall();
      refreshBoard();
    }else{
      const msg = res && res.error==='not_found'
        ? 'Fant ingen med det navnet – trykk ✕ og lag «Ny smaker»'
        : 'Feil kode – prøv igjen!';
      pinFail(msg);
    }
  }catch(e){ pinFail('Fikk ikke kontakt – sjekk nettet og prøv igjen'); }
}
function pinFail(msg){
  $('pinErr').textContent = msg;
  const w = $('pinDots'); w.classList.remove('shake'); void w.offsetWidth; w.classList.add('shake');

function renderAll(){

  renderWall();
  if(detailId) renderDetail();

function setTab(t){
  TAB = t;
  ['beste','nyeste','usmakt'].forEach(x=>$('tab-'+x).classList.toggle('on', x===t));
  renderWall();
}
function sortedCheeses(){
  let list = [...BOARD.cheeses];
  if(TAB==='usmakt') list = list.filter(c=>!myRating(c.id));
  if(TAB==='beste'){
    list.sort((a,b)=>{
      const aa=avgOf(a.id), bb=avgOf(b.id);
      if(aa===null && bb===null) return 0;
      if(aa===null) return 1;
      if(bb===null) return -1;
      return bb-aa || ratingsFor(b.id).length-ratingsFor(a.id).length;
    });
  }else{
    list.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  }
  return list;
}
function renderWall(){
  const wall = $('wall'); wall.innerHTML='';
  const list = sortedCheeses();
  if(!list.length){
    const d = document.createElement('div');
    d.className='empty';
    d.innerHTML = TAB==='usmakt'
      ? 'Du har smakt alle ostene! 🎉🧀<br><span class="mini">Fantastisk innsats. På tide med et nytt ostemarked?</span>'
      : 'Ingen oster ennå!<br><span class="mini">Trykk «➕ Ny ost» og legg inn den første 🥖</span>';
    wall.appendChild(d);
    return;
  }
  list.forEach(c=>{
    const mine = myRating(c.id);
    const avg = avgOf(c.id);
    const n = ratingsFor(c.id).length;
    const card = document.createElement('div');
    card.className='cheese';
    const photo = c.photo
      ? `<div class="photo" style="background-image:url('${c.photo}')" onclick="openDetail('${c.id}')"></div>`
      : `<div class="photo" onclick="openDetail('${c.id}')">${esc((c.type||'🧀').split(' ')[0]||'🧀')}</div>`;
    const emos = [1,2,3,4,5].map(s=>
      `<button class="${mine && mine.score===s ? 'on':''}" onclick="rate('${c.id}',${s},event)">${EMO[s]}</button>`
    ).join('');
    card.innerHTML = `
      ${photo}
      <div class="body">
        <div class="name-row" onclick="openDetail('${c.id}')">
          <div class="name">${esc(c.name)}</div>
          <div class="avg">${avg!==null ? EMO[Math.round(avg)]+' '+avg.toFixed(1) : '–'} <small>(${n})</small></div>
        </div>
        <div class="meta">
          ${c.type ? `<span class="typechip">${esc(c.type)}</span>`:''}
          ${c.origin ? `<span class="typechip">📍 ${esc(c.origin)}</span>`:''}
          <span class="typechip">av ${esc(c.added_by)}</span>
          ${!mine ? '<span class="badge-new">du har ikke smakt!</span>':''}
        </div>
        <div class="emorow">${emos}</div>
      </div>`;
    wall.appendChild(card);
  });
}

/* ---------- rating (selve greia) ---------- */
async function rate(cheeseId, score, ev){
  if(!SESS) return;
  if(ev) confetti(ev.clientX||innerWidth/2, ev.clientY||innerHeight/2, EMO[score]);
  // optimistisk: oppdater lokalt med en gang, så føles trykket momentant
  const existing = BOARD.ratings.find(r=>r.cheese_id===cheeseId && r.member===SESS.name);
  const note = existing ? existing.note : '';
  if(existing){ existing.score = score; existing.updated_at = new Date().toISOString(); }
  else BOARD.ratings.push({cheese_id:cheeseId, member:SESS.name, score, note:'', updated_at:new Date().toISOString()});
  saveLocal(); renderAll();
  if($('overlay-detail') && detailId===cheeseId) $('dHint').textContent = EMO[score]+' '+EMO_WORD[score];
  try{
    const res = await rpc('flayost_rate', {p_name:SESS.name, p_pin:SESS.pin, p_cheese_id:cheeseId, p_score:score, p_note:note});
    if(!res || !res.ok) throw new Error(res && res.error);
    refreshBoard();
  }catch(e){
    queuePending(cheeseId, score, note);
    toast('Fikk ikke lagret på nett 😬 – prøver igjen automatisk');
  }
}

function renderDetail(){
  const c = BOARD.cheeses.find(x=>x.id===detailId);
  if(!c){ closeDetail(); return; }
  const mine = myRating(c.id);
  const avg = avgOf(c.id), n = ratingsFor(c.id).length;
  $('dName').textContent = c.name;
  $('dMeta').textContent = (c.type? c.type+' · ':'') + (c.origin? '📍 '+c.origin+' · ':'') + 'lagt til av ' + c.added_by;
  $('dPhotoWrap').innerHTML = c.photo
    ? `<img class="dphoto" src="${c.photo}" alt="">`
    : `<div class="dphoto-emoji">${esc((c.type||'🧀').split(' ')[0]||'🧀')}</div>`;
  $('dAvg').textContent = avg!==null ? `${EMO[Math.round(avg)]} ${avg.toFixed(1)} av 5 · ${n} ${n===1?'dom':'dommer'}` : 'Ingen har smakt ennå!';
  $('dEmoRow').innerHTML = [1,2,3,4,5].map(s=>
    `<button class="${mine && mine.score===s?'on':''}" onclick="rate('${c.id}',${s},event)">${EMO[s]}</button>`
  ).join('');
  $('dHint').textContent = mine ? EMO[mine.score]+' '+EMO_WORD[mine.score] : 'Trykk på en smiley!';
  $('dNote').value = mine ? (mine.note||'') : '';
  const list = $('dRatings'); list.innerHTML='';
  const rs = ratingsFor(c.id).sort((a,b)=>b.score-a.score);
  rs.forEach(r=>{
    const m = memberOf(r.member) || {avatar:'🙂'};
    const line = document.createElement('div');
    line.className='rline';
    line.innerHTML = `<span class="ava">${esc(m.avatar)}</span><span class="who">${esc(r.member)}</span>
      <span class="note">${esc(r.note||'')}</span><span class="sc">${EMO[r.score]}</span>`;
    list.appendChild(line);
  });
  if(!rs.length){
    const p=document.createElement('p'); p.className='mini center'; p.textContent='Bli den første som smaker!';
    list.appendChild(p);
  }
  $('dDelete').classList.toggle('hidden', !SESS || SESS.is_kid);
}
async function saveNote(){
  const mine = myRating(detailId);
  if(!mine){ toast('Velg en smiley først 😊'); return; }
  const note = $('dNote').value.trim();
  mine.note = note; saveLocal(); renderDetail();
  try{
    const res = await rpc('flayost_rate', {p_name:SESS.name, p_pin:SESS.pin, p_cheese_id:detailId, p_score:mine.score, p_note:note});
    if(!res || !res.ok) throw new Error();
    toast('Notat lagret ✅');
    refreshBoard();
  }catch(e){
    queuePending(detailId, mine.score, note);
    toast('Fikk ikke lagret på nett – prøver igjen automatisk');
  }
}
async function deleteCheese(){
  const c = BOARD.cheeses.find(x=>x.id===detailId);
  if(!c || !confirm(`Slette «${c.name}» og alle dommene? Dette kan ikke angres.`)) return;
  try{
    const res = await rpc('flayost_delete_cheese', {p_name:SESS.name, p_pin:SESS.pin, p_cheese_id:detailId});
    if(!res || !res.ok) throw new Error(res && res.error);
    BOARD.cheeses = BOARD.cheeses.filter(x=>x.id!==detailId);
    BOARD.ratings = BOARD.ratings.filter(r=>r.cheese_id!==detailId);
    saveLocal(); closeDetail(); renderAll();
    toast('Osten er slettet');
  }catch(e){ toast('Fikk ikke slettet (kun voksne kan slette)'); }
}

/* =====================================================================
   NY OST
   ===================================================================== */
function openAdd(){
  addPhoto=null; addMilk=MILKS[0]; addTex=null; addOriginPick=null;
  $('addName').value='';
  $('addOrigin').value='';
  $('addPreview').classList.add('hidden');
  $('addFile').value='';
  hideSuggestions(); renderOriginLine();
  const mr = $('milkRow'); mr.innerHTML='';
  MILKS.forEach(m=>{
    const b=document.createElement('button');
    b.className='chip'+(m===addMilk?' on':'');
    b.textContent=m[0]+' '+m[1];
    b.onclick=()=>selectMilk(m);
    mr.appendChild(b);
  });
  const tr = $('texRow'); tr.innerHTML='';
  TEXTURES.forEach(t=>{
    const b=document.createElement('button');
    b.className='chip';
    b.textContent=t;
    b.onclick=()=>selectTex(addTex===t ? null : t);
    tr.appendChild(b);
  });
  $('overlay-add').classList.remove('hidden');
  setTimeout(()=>$('addName').focus(), 100);
}
function closeAdd(){ hideSuggestions(); $('overlay-add').classList.add('hidden'); }
function selectMilk(m){
  addMilk = m;
  [...$('milkRow').children].forEach((c,i)=>c.classList.toggle('on', MILKS[i]===m));
}
function selectTex(t){
  addTex = t;
  [...$('texRow').children].forEach(c=>c.classList.toggle('on', c.textContent===addTex));
}

/* ---------- osteforslag mens du skriver ---------- */
function fold(s){
  return String(s||'').toLowerCase().normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'').replace(/[-'’.]/g,' ').replace(/\s+/g,' ').trim();
}
function cheeseSuggest(q){
  const f = fold(q);
  if(f.length<2) return [];
  const pre=[], sub=[];
  for(const c of CHEESES_FR){
    const fn = fold(c.name);
    if(fn.startsWith(f)) pre.push(c);
    else if(fn.includes(f)) sub.push(c);
  }
  return pre.concat(sub).slice(0,6);
}
function onAddNameInput(){
  if(addOriginPick){ addOriginPick=null; renderOriginLine(); }
  clearTimeout(sugTimer);
  sugTimer = setTimeout(renderSuggestions, 300);
}
function renderSuggestions(){
  const list = $('sugList');
  const hits = cheeseSuggest($('addName').value);
  list.innerHTML='';
  if(!hits.length){ list.classList.add('hidden'); return; }
  hits.forEach(c=>{
    const b = document.createElement('button');
    b.type='button'; b.className='sugitem';
    b.innerHTML = `<span class="smilk">${MILK_EMO[c.milk]||'🧀'}</span>
      <span class="sname">${esc(c.name)}</span><span class="sorig">${esc(c.origin)}</span>`;
    // pointerdown + preventDefault: da rekker ikke input å miste fokus før valget
    b.onpointerdown = ev=>{ ev.preventDefault(); pickSuggestion(c); };
    list.appendChild(b);
  });
  list.classList.remove('hidden');
}
function hideSuggestions(){
  clearTimeout(sugTimer);
  const list = $('sugList');
  list.classList.add('hidden'); list.innerHTML='';
}
function pickSuggestion(c){
  $('addName').value = c.name;
  const m = MILKS.find(x=>x[1]===c.milk);
  if(m) selectMilk(m);
  if(c.tex) selectTex(c.tex);
  addOriginPick = {origin:c.origin, lat:c.lat, lng:c.lng};
  hideSuggestions();
  renderOriginLine();
}
function renderOriginLine(){
  const line = $('originLine'), manual = $('originManual');
  if(addOriginPick){
    line.innerHTML = `<span class="otxt">📍 ${esc(addOriginPick.origin)}</span>
      <button type="button" title="Fjern sted" onclick="clearPickedOrigin()">✕</button>`;
    line.classList.remove('hidden');
    manual.classList.add('hidden');
  }else{
    line.classList.add('hidden'); line.innerHTML='';
    manual.classList.remove('hidden');
  }
}
function clearPickedOrigin(){
  addOriginPick = null;
  renderOriginLine();
}
function onPhotoPicked(input){
  const f = input.files && input.files[0];
  if(!f) return;
  const img = new Image();
  img.onload = ()=>{
    // krymp til maks 512px og komprimer — blir en liten thumbnail i databasen
    const max = 512;
    const scale = Math.min(1, max/Math.max(img.width, img.height));
    const cv = document.createElement('canvas');
    cv.width = Math.round(img.width*scale); cv.height = Math.round(img.height*scale);
    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
    addPhoto = cv.toDataURL('image/jpeg', 0.7);
    URL.revokeObjectURL(img.src);
    const p = $('addPreview'); p.src = addPhoto; p.classList.remove('hidden');
  };
  img.src = URL.createObjectURL(f);
}
async function saveCheese(){
  const name = $('addName').value.trim();
  if(!name){ toast('Skriv hva osten heter 🧀'); return; }
  const type = (addMilk[1]==='Vet ikke' ? '🧀' : addMilk[0]+' '+addMilk[1]) + (addTex ? ' · '+addTex : '');
  // sted: fra osteforslaget (med koordinater) eller fritekstfeltet (uten)
  const origin = addOriginPick ? addOriginPick.origin : $('addOrigin').value.trim();
  const lat = addOriginPick ? addOriginPick.lat : null;
  const lng = addOriginPick ? addOriginPick.lng : null;
  $('addSave').disabled = true;
  try{
    const res = await rpc('flayost_add_cheese', {p_name:SESS.name, p_pin:SESS.pin, p_cheese_name:name, p_type:type, p_photo:addPhoto, p_origin:origin, p_lat:lat, p_lng:lng});
    if(!res || !res.ok) throw new Error(res && res.error);
    closeAdd();
    toast(`«${name}» er med i smakingen! 🎉`);
    await refreshBoard();
    setTab('nyeste');
  }catch(e){
    toast(e.message==='photo_too_big' ? 'Bildet ble for stort – prøv uten bilde' : 'Fikk ikke lagret – sjekk nettet');
  }
  $('addSave').disabled = false;
}

/* ---------- oppstart ---------- */
if(SESS){ enterWall(); refreshBoard(); }
else showWho();
